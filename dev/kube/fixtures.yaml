apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: crashloop
spec:
  restartPolicy: Always
  containers:
  - name: boom
    image: busybox:1.36
    command: ["sh","-c","echo boom; sleep 1; exit 1"]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ticks
data:
  v: "0"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: oneshot
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: curl
        image: curlimages/curl:8.10.1
        command: ["sh","-c","echo hello; sleep 2;"]
